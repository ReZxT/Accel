server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Proxy bootstrap API - SSE requires buffering off
    location /chat {
        proxy_pass http://host.docker.internal:8100;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
    }

    location /health {
        proxy_pass http://host.docker.internal:8100;
    }

    location /approve/ {
        proxy_pass http://host.docker.internal:8100;
        proxy_http_version 1.1;
    }

    location /settings/ {
        proxy_pass http://host.docker.internal:8100;
        proxy_http_version 1.1;
    }

    location /voice/ {
        proxy_pass http://host.docker.internal:8100;
        proxy_http_version 1.1;
    }

    # Proxy code-splitter (session, profile, ingest, knowledge base)
    location /session {
        proxy_pass http://host.docker.internal:9200;
        proxy_http_version 1.1;
    }

    location /profile {
        proxy_pass http://host.docker.internal:9200;
        proxy_http_version 1.1;
    }

    location /ingest {
        proxy_pass http://host.docker.internal:9200;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
    }

    location /kb/ {
        proxy_pass http://host.docker.internal:9200;
        proxy_http_version 1.1;
    }
}
