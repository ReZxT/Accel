<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accel</title>
  <link rel="stylesheet" href="blob_ui.css?v=202604252100">
  <link rel="stylesheet" href="https://unpkg.com/tldraw@2.4.0/tldraw.css" />
  <script type="importmap">
  {
    "imports": {
      "react":            "https://esm.sh/react@18.3.1",
      "react-dom":        "https://esm.sh/react-dom@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "tldraw":           "https://esm.sh/tldraw@2.4.0?deps=react@18.3.1,react-dom@18.3.1"
    }
  }
  </script>
</head>
<body>

  <!-- Animated background blobs -->
  <div class="blob-container" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
    <div class="blob blob-5"></div>
  </div>

  <!-- App layout -->
  <div class="app-layout" id="appLayout">

  <!-- Session sidebar -->
  <nav class="session-sidebar" id="sessionSidebar"></nav>

  <!-- Main chat shell -->
  <div class="chat-wrapper">

    <!-- Header -->
    <header class="chat-header glass-panel">
      <div class="header-left">
        <div class="status-orb" id="statusDot"></div>
        <div class="header-text">
          <h1><span>Accel</span></h1>
          <span class="status-label" id="statusText">Not configured</span>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="canvasToggleBtn" onclick="toggleCanvas()" title="Toggle canvas" style="display:none">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/>
          </svg>
        </button>
        <button class="icon-btn" onclick="toggleSettings()" title="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
      </div>
    </header>

    <!-- Settings Panel (collapsible) -->
    <div class="settings-panel glass-panel" id="settingsPanel">
      <div class="mobile-sessions" id="mobileSessionList"></div>
      <div class="settings-tools">
        <div class="settings-tools-left">
          <button class="tool-btn" onclick="clearChat()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
            Clear Chat
          </button>
          <button class="tool-btn" onclick="toggleDebug()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
            Debug Log
          </button>
        </div>
        <div class="settings-tools-right">
          <button class="tool-btn" id="vaultBtn" onclick="indexVault()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            Index Notes <span id="vaultBtnStatus"></span>
          </button>
          <button class="tool-btn" onclick="toggleKnowledge()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
            Knowledge Base
          </button>
        </div>
      </div>

      <div class="settings-voice-row">
        <span class="settings-voice-label">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
          Voice Mode
        </span>
        <label class="voice-toggle">
          <input type="checkbox" id="voiceToggle" onchange="toggleVoice(this.checked)">
          <span class="voice-toggle-slider"></span>
        </label>
      </div>

      <div class="tool-settings-section">
        <button class="tool-settings-header" onclick="this.closest('.tool-settings-section').classList.toggle('open')" aria-expanded="false">
          Tool Approval
          <svg class="tool-settings-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </button>
        <div id="toolSettingsList"></div>
      </div>
    </div>

    <!-- Knowledge Base Panel -->
    <div class="settings-panel glass-panel" id="knowledgePanel">
      <div class="settings-grid">
        <div class="setting-group full-width">
          <label>Add to Knowledge Base</label>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">
            <select id="kbSourceType" class="glass-input" style="flex:1;min-width:120px">
              <option value="document">Document</option>
              <option value="book">Book</option>
              <option value="note">Note</option>
              <option value="paper">Paper</option>
            </select>
            <input type="text" id="kbTitle" class="glass-input" placeholder="Title (optional)" style="flex:2;min-width:160px" />
            <input type="text" id="kbAuthor" class="glass-input" placeholder="Author (optional)" style="flex:2;min-width:160px" />
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <input type="file" id="kbFileInput" accept=".pdf,.epub,.txt,.md,.rst" multiple style="display:none" onchange="ingestFiles(this.files)" />
            <input type="file" id="kbFolderInput" accept=".pdf,.epub,.txt,.md,.rst" multiple webkitdirectory style="display:none" onchange="ingestFiles(this.files)" />
            <button class="tool-btn" onclick="document.getElementById('kbFileInput').click()">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
              Files
            </button>
            <button class="tool-btn" onclick="document.getElementById('kbFolderInput').click()">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
              Folder
            </button>
          </div>
        </div>
        <div class="setting-group full-width" id="kbProgressArea" style="display:none">
          <label>Progress <span id="kbProgressHeader" style="font-weight:400;opacity:0.7;margin-left:6px"></span></label>
          <div id="kbProgressList" style="display:flex;flex-direction:column;gap:4px;max-height:200px;overflow-y:auto"></div>
        </div>
      </div>
    </div>

    <!-- Debug Panel -->
    <div class="debug-panel glass-panel" id="debugPanel">
      <div class="debug-header">
        <span>🐛 Debug Log</span>
        <button class="icon-btn" onclick="toggleDebug()" title="Close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="debug-content" id="debugLog">
        <div class="log-entry log-info">Debug log initialized. Test your connection to see details here.</div>
      </div>
    </div>

    <!-- Chat + Canvas split wrapper -->
    <div class="content-area" id="contentArea">

    <!-- Chat Messages -->
    <main class="chat-messages" id="chatContainer">
      <div class="welcome-state" id="welcomeMessage">
        <div class="welcome-blob-icon">
          <div class="mini-blob"></div>
        </div>
        <h2>Accel</h2>
        <p class="welcome-sub">Your second brain. Ask anything, build anything, remember everything.</p>
        <div class="quick-actions">
          <button class="quick-action glass-panel" onclick="sendQuickAction('What do you remember about me?')">What do you remember about me?</button>
          <button class="quick-action glass-panel" onclick="sendQuickAction('What are you capable of? List your tools.')">What can you do?</button>
          <button class="quick-action glass-panel" onclick="sendQuickAction('What have we been working on lately?')">What have we been working on?</button>
        </div>
      </div>
    </main>

    <!-- Canvas panel (Architecture session) -->
    <div id="canvasPanel" class="canvas-panel" style="display:none">
      <div id="canvasRoot"></div>
    </div>

    </div><!-- /content-area -->

    <!-- Now Playing Widget (Music session only) -->
    <audio id="npAudio" preload="auto"></audio>
    <div id="nowPlayingWidget" style="display:none">
      <img id="npArt" src="" alt="" />
      <div class="np-info">
        <span id="npTitle" class="np-title"></span>
        <span id="npArtist" class="np-artist"></span>
        <div class="np-progress-wrap" onclick="seekFromClick(event)">
          <div class="np-progress-track">
            <div id="npProgressBar" class="np-progress-fill"></div>
          </div>
          <span id="npPosition" class="np-time">0:00</span>
          <span id="npDuration" class="np-time np-duration"></span>
        </div>
      </div>
      <div class="np-controls">
        <button onclick="playerAction('previous')" title="Previous">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="19,20 9,12 19,4"/><rect x="5" y="4" width="3" height="16"/></svg>
        </button>
        <button id="npPlayBtn" onclick="playerAction('play_pause')" title="Play/Pause">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
        </button>
        <button onclick="playerAction('next')" title="Next">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,4 15,12 5,20"/><rect x="16" y="4" width="3" height="16"/></svg>
        </button>
      </div>
    </div>

    <!-- Input Area -->
    <footer class="chat-input-area">
      <div class="image-preview-strip" id="imagePreviewStrip"></div>
      <div class="input-wrapper glass-panel" id="inputWrapper">
        <input type="file" id="imageInput"
          accept="image/*,.pdf,.txt,.md,.js,.ts,.jsx,.tsx,.css,.html,.htm,.xml,.json,.yaml,.yml,.csv,.py,.rb,.go,.rs,.java,.c,.cpp,.h,.hpp,.cs,.php,.swift,.kt,.lua,.sh,.bash,.sql,.toml,.ini,.conf,.env,.log,.diff,.patch,.r,.zig,.ex,.exs,.hs,.ml,.clj,.scala,.pl,.m,.mm,.dockerfile"
          multiple hidden />
        <button class="attach-btn" onclick="document.getElementById('imageInput').click()" title="Attach images, PDFs, or code files">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <polyline points="21 15 16 10 5 21"></polyline>
          </svg>
        </button>
        <textarea
          id="messageInput"
          placeholder="Type your message... (Shift+Enter for new line)"
          rows="1"
        ></textarea>
        <button class="send-btn" id="sendBtn" title="Send Message">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
      <div class="input-footer">
        <span id="webhookDisplay">⚙️ Configure webhook above</span>
        <span id="charCount">0 chars</span>
      </div>
    </footer>

  </div><!-- chat-wrapper -->
  </div><!-- app-layout -->

  <!-- Toast -->
  <div class="toast" id="toast"></div>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  </script>
  <script src="blob_ui.js?v=202604252100"></script>
  <script type="module">
    import React, { useCallback } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Tldraw, createShapeId } from 'tldraw'; // resolved via importmap to tldraw@2.4.0

    function buildProps(s) {
      const color = s.color || 'blue';
      const size  = s.size  || 'm';
      const text  = s.text  || '';
      const font  = 'draw';
      switch (s.type) {
        case 'text':
          return { color, size, text, font, align: 'middle', autoSize: true, w: 8, scale: 1 };
        case 'note':
          return { color, size, text, font, align: 'middle', verticalAlign: 'middle',
                   growY: 0, fontSizeAdjustment: 0, url: '' };
        case 'geo':
          return { geo: s.geo || 'rectangle', color, size, text, font,
                   fill: s.fill || 'none', dash: 'draw',
                   align: 'middle', verticalAlign: 'middle',
                   growY: 0, labelColor: 'black', url: '',
                   w: s.w || 200, h: s.h || 80 };
        case 'arrow':
          return { color, size, text, font, dash: 'draw',
                   arrowheadStart: 'none', arrowheadEnd: 'arrow',
                   fill: 'none', labelColor: 'black', bend: 0,
                   start: { type: 'point', x: 0, y: 0 },
                   end:   { type: 'point', x: s.w || 200, y: 0 } };
        default:
          return { color, size, text, font };
      }
    }

    function syncBounds(editor) {
      const el = document.getElementById('canvasRoot');
      if (!el || !editor) return;
      const rect = el.getBoundingClientRect();
      if (rect.width < 1 || rect.height < 1) return;
      const Box = editor.getViewportScreenBounds().constructor;
      editor.updateViewportScreenBounds(new Box(rect.x, rect.y, rect.width, rect.height));
    }

    function Canvas() {
      const handleMount = useCallback(async (editor) => {
        window._tldrawEditor = editor;

        try {
          const resp = await fetch('/canvas/state');
          const snapshot = await resp.json();
          if (snapshot && snapshot.store) {
            editor.store.loadSnapshot(snapshot);
          }
        } catch (_) {}

        // Save state to server on every change (debounced 1s)
        let _saveTimer = null;
        editor.store.listen(() => {
          clearTimeout(_saveTimer);
          _saveTimer = setTimeout(() => {
            const snapshot = editor.store.getSnapshot();
            fetch('/canvas/state', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(snapshot),
            }).catch(() => {});
          }, 1000);
        }, { scope: 'document', source: 'all' });

        setTimeout(() => syncBounds(editor), 100);
      }, []);
      return React.createElement(Tldraw, { onMount: handleMount });
    }

    // Mount lazily when the canvas panel first becomes visible
    let _mounted = false;
    window._mountTldraw = function() {
      if (_mounted) {
        setTimeout(() => syncBounds(window._tldrawEditor), 50);
        return;
      }
      _mounted = true;
      const root = document.getElementById('canvasRoot');
      if (root) createRoot(root).render(React.createElement(Canvas));
    };

    // Auto-mount if canvas panel was already shown before module loaded (session restore race)
    if (document.getElementById('canvasPanel')?.style.display !== 'none') {
      window._mountTldraw();
    }

    // Expose command API for blob_ui.js
    window._canvasCommand = function(type, data) {
      const ed = window._tldrawEditor;
      if (!ed) return;
      if (type === 'tldraw:create_shapes') {
        ed.createShapes((data.shapes || []).map(s => ({
          id: createShapeId(),
          type: s.type || 'note',
          x: s.x ?? 100,
          y: s.y ?? 100,
          props: buildProps(s),
        })));
        ed.zoomToFit({ animation: { duration: 300 } });
      } else if (type === 'tldraw:clear') {
        ed.selectAll();
        ed.deleteShapes(ed.getSelectedShapeIds());
      }
    };
  </script>
</body>
</html>
